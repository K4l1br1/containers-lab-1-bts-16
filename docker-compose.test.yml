services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myapp_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-network

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-network

  nginx:
    image: local-nginx-test:latest
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - test-network

networks:
  test-network: